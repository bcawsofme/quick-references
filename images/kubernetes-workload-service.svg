<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes workload and service flow</title>
  <desc id="desc">Diagram showing a Deployment owning a ReplicaSet, the ReplicaSet owning Pods, and a Service selecting Pods by label before routing traffic to them.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="480" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Workloads, Labels, and Services</text>
  <rect x="60" y="110" width="190" height="90" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="155" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Deployment</text>
  <text x="155" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">desired replicas</text>
  <rect x="345" y="110" width="190" height="90" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="440" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">ReplicaSet</text>
  <text x="440" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">keeps Pod count</text>
  <rect x="690" y="105" width="190" height="72" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="785" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Service</text>
  <text x="785" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">selector app=web</text>
  <rect x="245" y="300" width="130" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="310" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Pod</text>
  <text x="310" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">app=web</text>
  <rect x="415" y="300" width="130" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="480" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Pod</text>
  <text x="480" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">app=web</text>
  <rect x="585" y="300" width="130" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="650" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Pod</text>
  <text x="650" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">app=web</text>
  <rect x="690" y="430" width="190" height="62" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="785" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Client traffic</text>
  <text x="785" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">ClusterIP, NodePort, Ingress</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <line x1="250" y1="155" x2="345" y2="155" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="440" y1="200" x2="480" y2="300" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="785" y1="177" x2="650" y2="300" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="785" y1="177" x2="480" y2="300" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="785" y1="177" x2="310" y2="300" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="785" y1="430" x2="785" y2="177" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="298" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">creates</text>
  <text x="505" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">owns Pods</text>
  <text x="720" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">routes to selected Pods</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes storage and security map</title>
  <desc id="desc">Diagram showing PersistentVolumeClaim binding to PersistentVolume through StorageClass and Pod identity using ServiceAccount and RBAC.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="480" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Storage and Security Relationships</text>
  <text x="250" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Storage path</text>
  <rect x="60" y="130" width="160" height="78" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Pod</text>
  <text x="140" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">mounts volume</text>
  <rect x="300" y="130" width="160" height="78" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="380" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">PVC</text>
  <text x="380" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">requests storage</text>
  <rect x="540" y="130" width="160" height="78" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="620" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">PV</text>
  <text x="620" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">actual storage</text>
  <rect x="300" y="250" width="400" height="66" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="500" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">StorageClass</text>
  <text x="500" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">dynamic provisioning rules</text>
  <text x="710" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Security path</text>
  <rect x="625" y="360" width="160" height="66" rx="10" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
  <text x="705" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">ServiceAccount</text>
  <text x="705" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Pod identity</text>
  <rect x="405" y="360" width="150" height="66" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="480" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Role</text>
  <text x="480" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">permissions</text>
  <rect x="150" y="360" width="180" height="66" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="240" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">RoleBinding</text>
  <text x="240" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">binds identity to role</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <line x1="220" y1="169" x2="300" y2="169" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="460" y1="169" x2="540" y2="169" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="500" y1="250" x2="500" y2="205" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="625" y1="393" x2="555" y2="393" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="405" y1="393" x2="330" y2="393" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="705" y1="360" x2="170" y2="208" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="260" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">uses</text>
  <text x="500" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">binds</text>
  <text x="700" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">assigned to Pod</text>
</svg>

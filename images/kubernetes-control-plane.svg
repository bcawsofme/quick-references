<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes control plane flow</title>
  <desc id="desc">Diagram showing kubectl talking to kube-apiserver, apiserver storing state in etcd, and scheduler and controller manager reconciling workloads onto nodes.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="480" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Kubernetes Control Plane Mental Model</text>
  <rect x="40" y="100" width="170" height="86" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">kubectl</text>
  <text x="125" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">user request</text>
  <rect x="310" y="92" width="220" height="102" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="420" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">kube-apiserver</text>
  <text x="420" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">authn, authz, admission</text>
  <rect x="670" y="100" width="190" height="86" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="765" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">etcd</text>
  <text x="765" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">cluster state</text>
  <rect x="250" y="270" width="210" height="96" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="355" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">scheduler</text>
  <text x="355" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">places pending Pods</text>
  <rect x="510" y="270" width="250" height="96" rx="10" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
  <text x="635" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">controller manager</text>
  <text x="635" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">reconciles desired state</text>
  <rect x="330" y="425" width="300" height="70" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="480" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">worker nodes</text>
  <text x="480" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">kubelet runs assigned Pods</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <line x1="210" y1="143" x2="310" y2="143" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="530" y1="143" x2="670" y2="143" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="410" y1="194" x2="365" y2="270" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="460" y1="194" x2="610" y2="270" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="355" y1="366" x2="430" y2="425" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="635" y1="366" x2="535" y2="425" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="260" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">API request</text>
  <text x="600" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">persist</text>
  <text x="485" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">watch and act</text>
</svg>
